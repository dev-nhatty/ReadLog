<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Book Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>ReadLog</h1>
  <form id="book-form">
    <input type="text" id="title-input" placeholder="Title" required>
    <input type="text" id="author-input" placeholder="Author" required>
    <input type="text" id="genre-input" placeholder="Genre" required>
    <input type="number" id="rating-input" placeholder="Rating" min="0" max="5" step="0.1" required>
    <button type="submit">Add Book</button>
  </form>

  <input type="text" id="search-input" placeholder="Search by title or author">

  <select id="sort-select">
  <option value="none">Sort by...</option>
  <option value="rating-desc">Rating (High to Low)</option>
  <option value="title-asc">Title (A-Z)</option>
</select>

  <div id="book-list"></div>

  <script src="script.js"></script>
</body>
</html>
